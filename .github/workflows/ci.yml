name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -tags=sqlite_fts5,sqlite_omit_load_extension
      GOCACHE: /tmp/mithra-build-cache
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 22.23.1
      - name: Verify formatting
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"
      - run: go mod verify
      - run: go vet ./...
      - run: go test ./...
      - run: go build -trimpath ./cmd/mithra
      - run: node --check web/static/app.js
      - run: node --test web/static/app.test.mjs
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
