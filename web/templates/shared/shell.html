{{define "primary-navigation"}}
<ul class="navigation-list" role="list">
  {{range .Navigation}}
    {{if .Group}}<li class="navigation-group" aria-hidden="true">{{.Group}}</li>{{end}}
    <li><a href="{{.Path}}" data-quick-destination{{if .Current}} aria-current="page"{{end}}>{{.Label}}</a></li>
  {{end}}
</ul>
{{end}}

{{define "app-shell"}}
<div data-app-shell>
  <header class="site-header">
    <a class="brand" href="/" aria-label="Mithra home"><span class="brand-mark" aria-hidden="true">M</span><span>Mithra</span></a>
    <nav class="desktop-navigation" aria-label="Primary navigation">{{template "primary-navigation" .}}</nav>
  </header>
  <header class="mobile-header">
    <a class="brand" href="/" aria-label="Mithra home"><span class="brand-mark" aria-hidden="true">M</span><span>Mithra</span></a>
    <details class="mobile-navigation">
      <summary>Menu</summary>
      <div class="mobile-menu-panel">
        <nav aria-label="Primary navigation">{{template "primary-navigation" .}}</nav>
        <form method="post" action="/auth/logout" class="mobile-signout"><input type="hidden" name="csrf" value="{{.CSRF}}"><button type="submit">Sign out</button></form>
      </div>
    </details>
  </header>
  <div class="app-toolbar" aria-label="Quick tools">
    <div class="toolbar-controls">
      <div data-quick-navigation-mount></div>
      <button type="button" class="shortcut-help-trigger" data-shortcut-help-trigger aria-keyshortcuts="?">Shortcuts <kbd aria-hidden="true">?</kbd></button>
      <details class="account-menu">
        <summary>Account</summary>
        <div><a href="/settings">Settings</a><a href="/help">Help</a><form method="post" action="/auth/logout"><input type="hidden" name="csrf" value="{{.CSRF}}"><button type="submit">Sign out</button></form></div>
      </details>
    </div>
  </div>
</div>
{{end}}
