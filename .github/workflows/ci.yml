name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -tags=sqlite_fts5,sqlite_omit_load_extension
      GOCACHE: /tmp/mithra-build-cache
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 22.23.1
      - name: Verify formatting
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"
      - run: go mod verify
      - run: go vet ./...
      - run: go test ./...
      - name: Verify reset across installer and service identities
        run: sudo env "PATH=$PATH" "GOFLAGS=$GOFLAGS" GOCACHE=/tmp/mithra-root-test-cache go test -count=1 ./cmd/mithra-installer -run '^TestResetDemoRealServiceOwnedTree$' -v
      - run: go build -trimpath ./cmd/mithra
      - run: go build -trimpath ./cmd/mithra-installer
      - run: sh -n deploy/install.sh
      - run: find web/static -type f -name '*.js' -print0 | LC_ALL=C sort -z | xargs -0 -r -n1 node --check
      - run: find web/static -type f -name '*.test.mjs' -print0 | LC_ALL=C sort -z | xargs -0 -r node --test
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
